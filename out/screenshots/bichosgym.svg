<svg xmlns="http://www.w3.org/2000/svg" width="640" height="360" viewBox="0 0 640 360">
  <rect width="640" height="360" fill="#e8f5ee"/>
  <!-- Top nav bar -->
  <rect x="0" y="0" width="640" height="56" fill="#2d6a4f"/>
  <rect x="24" y="18" width="80" height="20" rx="4" fill="white" opacity="0.9"/>
  <!-- Hero section -->
  <rect x="0" y="56" width="640" height="200" fill="#e8f5ee"/>
  <rect x="80" y="90" width="280" height="24" rx="4" fill="#2d6a4f" opacity="0.15"/>
  <rect x="80" y="126" width="180" height="16" rx="4" fill="#2d6a4f" opacity="0.1"/>
  <!-- CTA button -->
  <rect x="80" y="170" width="140" height="40" rx="20" fill="#2d6a4f"/>
  <!-- Grid cards -->
  <rect x="400" y="80" width="160" height="100" rx="8" fill="white" opacity="0.8"/>
  <rect x="400" y="80" width="160" height="8" rx="0" fill="#2d6a4f"/>
  <rect x="420" y="102" width="100" height="12" rx="3" fill="#2d6a4f" opacity="0.3"/>
  <rect x="420" y="122" width="80" height="8" rx="3" fill="#2d6a4f" opacity="0.15"/>
  <rect x="420" y="138" width="60" height="8" rx="3" fill="#2d6a4f" opacity="0.1"/>
  <rect x="80" y="270" width="480" height="1" fill="#2d6a4f" opacity="0.1"/>
  <rect x="80" y="280" width="80" height="80" rx="8" fill="white" stroke="#2d6a4f" stroke-width="1" opacity="0.6"/>
  <rect x="180" y="280" width="80" height="80" rx="8" fill="white" stroke="#2d6a4f" stroke-width="1" opacity="0.6"/>
  <rect x="280" y="280" width="80" height="80" rx="8" fill="white" stroke="#2d6a4f" stroke-width="1" opacity="0.6"/>
  <!-- Client badge -->
  <text x="320" y="200" font-family="system-ui,sans-serif" font-size="48" font-weight="700" fill="#2d6a4f" opacity="0.12" text-anchor="middle">BG</text>
  <!-- Footer -->
  <rect x="0" y="330" width="640" height="30" fill="#2d6a4f" opacity="0.08"/>
</svg>